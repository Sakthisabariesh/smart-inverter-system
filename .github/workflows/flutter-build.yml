name: Flutter Automated Builds

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build APK
        working-directory: ./smart_inverter_app
        run: |
          flutter pub get
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: smart_inverter_app/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Enable Windows Desktop in Flutter
        run: flutter config --enable-windows-desktop
      - name: Build Windows
        working-directory: ./smart_inverter_app
        run: |
          flutter pub get
          flutter build windows --release
      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: smart_inverter_app/build/windows/*/runner/Release/
