services:
  - type: web
    name: smart-inverter-api
    runtime: python
    rootDir: iot-backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: INFLUX_URL
        sync: false
      - key: INFLUX_TOKEN
        sync: false
      - key: INFLUX_ORG
        sync: false
      - key: INFLUX_BUCKET
        sync: false
